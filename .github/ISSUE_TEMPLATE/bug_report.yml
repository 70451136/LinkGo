name: Bug 反馈 / Bug Report
description: 报告使用中的异常、失败或结果不符合预期 / Report an error, failure, or unexpected result
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤 / Steps to Reproduce
      placeholder: |
        1. 打开 / Open...
        2. 上传 / Upload...
        3. 输入 / Enter...
        4. 看到 / Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期结果 / Expected Result
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果 / Actual Result
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: 运行环境 / Environment
      placeholder: Windows / Linux / WSL / Other
  - type: textarea
    id: logs
    attributes:
      label: 脱敏日志或截图 / Sanitized Logs or Screenshots
      description: 请移除 API Key、Token、Cookie、客户文件内容等敏感信息。Remove API keys, tokens, cookies, customer content, and private data.
